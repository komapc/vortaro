<!DOCTYPE html>
<html lang="io">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortaro - Ido-Esperanto Dictionary</title>
    <meta name="description" content="Free online Ido-Esperanto dictionary. Fast, two-way search between Ido and Esperanto with morphology and source information.">
    <meta name="keywords" content="Ido, Esperanto, dictionary, vortaro, translation, linguo ido, auxlang, Apertium">
    <meta name="author" content="komapc">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://vortaro-98d.pages.dev/">
    <meta property="og:title" content="Vortaro - Ido-Esperanto Dictionary">
    <meta property="og:description" content="Fast, comprehensive Ido-Esperanto dictionary with over 20,000 entries.">
    <meta property="og:image" content="https://vortaro-98d.pages.dev/og-image.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://vortaro-98d.pages.dev/">
    <meta property="twitter:title" content="Vortaro - Ido-Esperanto Dictionary">
    <meta property="twitter:description" content="Fast, comprehensive Ido-Esperanto dictionary with over 20,000 entries.">
    <meta property="twitter:image" content="https://vortaro-98d.pages.dev/og-image.png">

    <!-- Canonical URL -->
    <link rel="canonical" href="https://vortaro-98d.pages.dev/">

    <!-- Structured Data (JSON-LD) -->

    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Vortaro",
      "operatingSystem": "Web",
      "applicationCategory": "EducationalApplication",
      "description": "Comprehensive Ido-Esperanto dictionary based on Wiktionary and Wikipedia data.",
      "author": {
        "@type": "Person",
        "name": "komapc"
      },
      "license": "https://opensource.org/licenses/MIT"
    }
    </script>

    <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="shortcut icon" href="favicon.png">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1f3f7a">

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js');
            });
        }
    </script>

    <!-- PullToRefresh.js -->
    <script src="https://cdn.jsdelivr.net/npm/pulltorefreshjs@0.1.22/dist/index.umd.min.js"></script>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DMH4HKHLLS"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-DMH4HKHLLS');
    </script>
</head>

<body>
    <div class="container">
        <header>
            <h1>📖 Vortaro</h1>
            <button class="info-button" id="infoButton" aria-label="Pri ca vortaro" tabindex="0">ℹ️ Pri</button>
        </header>

        <div class="search-container">
            <div class="search-header">
                <button class="direction-toggle" id="directionToggle" data-direction="io-eo"
                    aria-label="Chanjar direciono" tabindex="0" title="Kliktez por chanjar direciono">
                    <span class="toggle-text">Ido → Esperanto</span>
                    <span class="toggle-icon">⇄</span>
                </button>
                <button class="random-btn" id="randomBtn" aria-label="Hazarda vorto" tabindex="0"
                    title="Montrez hazarda vorto">
                    🎲
                </button>
            </div>
            <input type="text" id="searchInput" placeholder="Serchez en Ido..." autofocus autocomplete="off"
                aria-label="Serchez en vortaro" />
            <div class="search-info" id="searchInfo"></div>

            <!-- Filters Panel -->
            <div class="filters-container">
                <button class="filters-toggle" id="filtersToggle" aria-expanded="false">
                    <span class="filters-icon">🔽</span>
                    <span class="filters-text">Filtri</span>
                    <span class="filters-count" id="filtersCount"></span>
                </button>

                <div class="filters-panel" id="filtersPanel" aria-hidden="true">
                    <div class="filters-header">
                        <h3>Filtrar segun fonti</h3>
                        <button class="clear-filters" id="clearFilters">Vakuigar</button>
                    </div>

                    <div class="filter-group">
                        <div class="filter-options" id="sourceFilters">
                            <!-- Source filter checkboxes will be populated by JavaScript -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="results" class="results"></div>

        <footer>
            <div class="footer-line">
                Mea projekti: 
                <a href="https://vortaro-98d.pages.dev/">Vortaro</a> (<a href="https://github.com/komapc/vortaro" target="_blank">kodo</a>) <span class="footer-separator">·</span>
                <a href="https://ido-epo-translator.komapc.workers.dev/">Tradukilo</a> (<a href="https://github.com/komapc/ido-epo-translator" target="_blank">kodo</a>) <span class="footer-separator">·</span>
                <a href="https://komapc.github.io/a2a">EchoDrift</a> (<a href="https://github.com/komapc/a2a" target="_blank">kodo</a>)
            </div>
            <div class="footer-line">
                Rersursi: <a href="https://github.com/apertium" target="_blank">Apertium</a> <span class="footer-separator">·</span> 
                Kontakto: <a href="mailto:komapc@gmail.com">komapc@gmail.com</a> <span class="footer-separator">·</span> 
                <button onclick="showAboutModal()" style="background:none; border:none; color:white; cursor:pointer; font:inherit; padding:0; font-weight:600;">Pri la projekto</button>
                <span class="footer-separator">·</span> <span><span id="wordCount">...</span> vorti</span>
                <span id="version" class="version-tag">v1.0.0</span>
            </div>
        </footer>
    </div>

    <!-- About Modal -->
    <div class="modal" id="aboutModal" aria-hidden="true" role="dialog" aria-labelledby="modalTitle">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Pri Vortaro</h2>
                <button class="close-button" id="closeModal" aria-label="Klozez" tabindex="0">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <p class="loading">Kargante informo...</p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
